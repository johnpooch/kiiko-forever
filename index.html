<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>KiiKO Forever</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main">
    <!-- Layer 2: Katakana cascade (front) — populated by JS -->
    <div class="cascade" id="cascade" aria-hidden="true"></div>

    <!-- Layer 1: Content (back) -->
    <div class="content">
      <div class="content-top">
        <!-- Nav links -->
        <nav class="nav-links">
          <a href="https://open.spotify.com/artist/1d6oAwrCelcwZHgQk2ZHsY">Mus<em class="double-i">ii</em>c ♪(・ω・)</a>
          <a href="https://www.youtube.com/@KiiKO_music">V<em class="double-i">ii</em>deo (⌐■_■)</a>
          <a href="https://kiiko-ongaku.bandcamp.com/track/kiiko-forever">Store (づ ̄ ³ ̄)づ</a>
          <a href="https://1drv.ms/f/c/DFD959DB4EA1BA02/IgBv4iQPLJ38ToL16LGiHrWGAXXgP1r7S58KuqUT_PUxZYU?e=6UYwqR">Press m(_ _)m</a>
        </nav>

        <!-- Press photo -->
        <img class="press-photo" src="images/press-shot-1.jpg" alt="KiiKO press photo">

        <!-- Kaomoji cluster -->
        <div class="kaomoji-cluster">
          <span class="kaomoji-line">゜ﾟ**ﾟ</span>
          <span class="kaomoji-line">. · ✦  . · * .</span>
          <span class="kaomoji-line">(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧</span>
          <span class="kaomoji-line">☆ﾟ.*・｡ﾟ</span>
          <span class="kaomoji-line">♪♫•*¨*•.¸¸♪</span>
          <span class="kaomoji-line">✧･: *✧:*</span>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <a href="https://www.instagram.com/kiiko_ongaku/"><em class="double-i">ii</em>nstagram [◉°]</a>
        <a href="https://www.tiktok.com/@kiiko.music">T<em class="double-i">ii</em>kTok (〜￣▽￣)〜</a>
        <a href="mailto:kiiko.music@outlook.com">Contact (˶ᵔᵕᵔ˶）ﾉ♡</a>
      </footer>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const COLOURS = ['#ff2d2d', '#ff8c00', '#ffd700', '#00c04b', '#0077ff', '#8b00ff', '#ff69b4'];
      const EN_TEXT = 'KiiKO Forever';
      const JP_TEXT = 'キーコ・フォーエバー';
      const EN_OFFSET = 0;
      const JP_OFFSET = 5;

      // Glitch characters: symbols + katakana fragments
      const GLITCH_CHARS = '—~±§|[].+×%•キコフエバーォ';

      function getColour(charIndex, offset) {
        return COLOURS[(charIndex + offset) % 7];
      }

      function randomGlitchChar() {
        return GLITCH_CHARS[~~(Math.random() * GLITCH_CHARS.length)];
      }

      // ─── Katakana cascade generator ───

      function buildCascade() {
        const container = document.getElementById('cascade');

        const lineHeight = 15 * 1.1;
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const rowCount = Math.ceil(vh / lineHeight) + 5;

        let html = '';

        // Row 1: English line with double-i on "KiiKO"
        html += '<span class="cascade-line cascade-line--en">';
        for (let i = 0; i < EN_TEXT.length; i++) {
          const ch = EN_TEXT[i];
          const colour = getColour(i, EN_OFFSET);
          if (i === 1) html += '<em class="double-i">';
          html += '<span style="color:' + colour + '">' + ch + '</span>';
          if (i === 2) html += '</em>';
        }
        html += '</span>';

        // Rows 2+: Japanese lines
        for (let row = 1; row < rowCount; row++) {
          html += '<span class="cascade-line">';
          for (let i = 0; i < JP_TEXT.length; i++) {
            const ch = JP_TEXT[i];
            const colour = getColour(i, JP_OFFSET);
            html += '<span style="color:' + colour + '">' + ch + '</span>';
          }
          html += '</span>';
        }

        container.innerHTML = html;
      }

      // ─── Character splitting (links + kaomoji lines) ───

      function wrapCharsForHover() {
        const elements = document.querySelectorAll('.nav-links a, .footer a, .kaomoji-line');

        elements.forEach(el => {
          let charIndex = 0;

          function processNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
              const text = node.textContent;
              const frag = document.createDocumentFragment();
              for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.className = 'char';
                span.style.setProperty('--char-color', getColour(charIndex, 0));
                span.textContent = text[i];
                frag.appendChild(span);
                charIndex++;
              }
              return frag;
            } else if (node.nodeType === Node.ELEMENT_NODE) {
              const clone = node.cloneNode(false);
              node.childNodes.forEach(child => {
                clone.appendChild(processNode(child));
              });
              return clone;
            }
            return node.cloneNode(true);
          }

          const frag = document.createDocumentFragment();
          el.childNodes.forEach(child => {
            frag.appendChild(processNode(child));
          });
          el.innerHTML = '';
          el.appendChild(frag);
        });
      }

      // ─── Glitch text effect ───

      function glitchText(el, duration) {
        const chars = el.querySelectorAll('.char');
        if (!chars.length) return;

        // Store originals once (skip if already stored from a previous run)
        chars.forEach(ch => {
          if (!ch.dataset.original) ch.dataset.original = ch.textContent;
        });

        const total = chars.length;
        const startTime = performance.now();

        // Immediately scramble everything
        chars.forEach(ch => {
          if (ch.dataset.original !== ' ' && ch.dataset.original !== '\n') {
            ch.textContent = randomGlitchChar();
          }
        });

        function tick(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);

          // The "cursor" position — which character index we've resolved up to
          const resolved = Math.floor(progress * total);

          for (let i = 0; i < total; i++) {
            const ch = chars[i];
            const orig = ch.dataset.original;

            if (orig === ' ' || orig === '\n') continue;

            if (i < resolved) {
              // Behind cursor: show original
              ch.textContent = orig;
            } else if (i < resolved + 3) {
              // Near cursor: active scramble zone (re-randomize each frame)
              ch.textContent = randomGlitchChar();
            }
            // Ahead of cursor: keep initial scramble (don't update every frame)
          }

          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            // Ensure all characters are resolved
            chars.forEach(ch => { ch.textContent = ch.dataset.original; });
          }
        }

        requestAnimationFrame(tick);
      }

      // ─── Glitch cascade on load ───

      function glitchCascade(duration) {
        const lines = document.querySelectorAll('.cascade-line');
        const spans = document.querySelectorAll('.cascade-line > span, .cascade-line > em > span');
        if (!spans.length) return;

        spans.forEach(sp => {
          if (!sp.dataset.original) sp.dataset.original = sp.textContent;
          sp.textContent = randomGlitchChar();
        });

        const total = spans.length;
        const startTime = performance.now();

        function tick(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const resolved = Math.floor(progress * total);

          for (let i = 0; i < total; i++) {
            const sp = spans[i];
            const orig = sp.dataset.original;
            if (i < resolved) {
              sp.textContent = orig;
            } else if (i < resolved + 5) {
              sp.textContent = randomGlitchChar();
            }
          }

          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            spans.forEach(sp => { sp.textContent = sp.dataset.original; });
          }
        }

        requestAnimationFrame(tick);
      }

      // ─── Hover glitch binding ───

      function bindHoverGlitch() {
        const targets = document.querySelectorAll('.nav-links a, .footer a, .kaomoji-line');
        targets.forEach(el => {
          el.addEventListener('mouseenter', () => glitchText(el, 300));
        });
      }

      // ─── Init (wait for fonts) ───

      document.fonts.ready.then(() => {
        const main = document.querySelector('.main');

        buildCascade();
        wrapCharsForHover();

        // Show the page — glitch animation IS the reveal
        main.classList.add('ready');

        // Staggered glitch-reveal on page load
        const loadTargets = document.querySelectorAll('.nav-links a, .footer a, .kaomoji-line');
        loadTargets.forEach((el, i) => {
          setTimeout(() => glitchText(el, 800), i * 120);
        });
        glitchCascade(1200);

        bindHoverGlitch();
      });
    });
  </script>
</body>
</html>
